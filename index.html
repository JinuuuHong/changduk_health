<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026학년도 창덕여고 건강체력교실 참가 신청</title>
<style>
  body{font-family:-apple-system,'Pretendard',sans-serif;max-width:480px;margin:0 auto;padding:20px;background:#f5f7fa;}
  h2{text-align:center;color:#1f4e8c;}
  .field{margin-bottom:16px;}
  label{display:block;font-weight:600;margin-bottom:6px;}
  .req{color:#e53935;}
  input[type=text],select,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:16px;box-sizing:border-box;}
  textarea{min-height:80px;resize:vertical;}
  .sigPad{border:1px dashed #888;border-radius:8px;background:#fff;width:100%;height:160px;touch-action:none;display:block;}
  .row{display:flex;gap:8px;}
  button{flex:1;padding:12px;border:0;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;}
  .clear{background:#eee;}
  .submit{background:#1f4e8c;color:#fff;}
  .submit:disabled{background:#999;}
  #reasonField{display:none;}
  .msg{padding:14px;border-radius:8px;text-align:center;margin-top:12px;}
  .ok{background:#e8f5e9;color:#2e7d32;}
  .err{background:#ffebee;color:#c62828;}
</style>
</head>
<body>
<h2>건강체력교실 참가 신청</h2>
<form id="frm">
  <div class="field">
    <label>학번 <span class="req">*</span></label>
    <input type="text" id="studentId" required inputmode="numeric" placeholder="예: 10203">
  </div>
  <div class="field">
    <label>이름 <span class="req">*</span></label>
    <input type="text" id="name" required>
  </div>
  <div class="field">
    <label>참가 여부 <span class="req">*</span></label>
    <select id="attend" required>
      <option value="">선택하세요</option>
      <option value="참가">참가</option>
      <option value="불참">불참</option>
    </select>
  </div>
  <div class="field" id="reasonField">
    <label>불참 사유 <span class="req">*</span></label>
    <textarea id="reason" placeholder="불참 사유를 입력해 주세요"></textarea>
  </div>

  <div class="field">
    <label>학생 서명 <span class="req">*</span></label>
    <canvas id="sigStudent" class="sigPad"></canvas>
    <button type="button" class="clear" onclick="clearSig('student')" style="margin-top:6px;">학생 서명 지우기</button>
  </div>

  <div class="field">
    <label>학부모 서명 <span class="req">*</span></label>
    <canvas id="sigParent" class="sigPad"></canvas>
    <button type="button" class="clear" onclick="clearSig('parent')" style="margin-top:6px;">학부모 서명 지우기</button>
  </div>

  <div class="row">
    <button type="submit" class="submit" id="submitBtn">제출하기</button>
  </div>
  <div id="msg"></div>
</form>

<script>
// ⭐ 구글 앱스 스크립트 배포 주소를 아래 따옴표 안에 넣으세요!
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbR8wnwpAZqdwOiHafHMztiy5pnQIkxC_0BXPJ19EsXYZYDfCaFwwfmTNpZdg2L4D4/exec";

// 참가/불참에 따라 사유 필드 토글
const attendSel = document.getElementById('attend');
const reasonField = document.getElementById('reasonField');
const reasonInput = document.getElementById('reason');
attendSel.addEventListener('change', () => {
  reasonField.style.display = attendSel.value === '불참' ? 'block' : 'none';
});

// 서명 캔버스
const pads = {
  student: setupPad(document.getElementById('sigStudent')),
  parent:  setupPad(document.getElementById('sigParent'))
};

function setupPad(cv){
  const ctx = cv.getContext('2d');
  const state = { drawing:false, hasSig:false, cv, ctx };

  function resize(){
    const r = cv.getBoundingClientRect();
    cv.width = r.width; cv.height = r.height;
    ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
  }
  resize();
  window.addEventListener('resize', resize);

  function pos(e){
    const r = cv.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }
  function start(e){ state.drawing=true; state.hasSig=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
  function move(e){ if(!state.drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); }
  function end(){ state.drawing=false; }
  ['mousedown','touchstart'].forEach(ev=>cv.addEventListener(ev,start));
  ['mousemove','touchmove'].forEach(ev=>cv.addEventListener(ev,move));
  ['mouseup','mouseleave','touchend'].forEach(ev=>cv.addEventListener(ev,end));
  return state;
}

function clearSig(which){
  const p = pads[which];
  p.ctx.clearRect(0,0,p.cv.width,p.cv.height);
  p.hasSig = false;
}

// GitHub Pages용 제출 로직 (fetch API 사용)
document.getElementById('frm').addEventListener('submit', (e) => {
  e.preventDefault();
  const studentId = document.getElementById('studentId').value.trim();
  const name = document.getElementById('name').value.trim();
  const attend = attendSel.value;
  const reason = reasonInput.value.trim();
  const msg = document.getElementById('msg');
  msg.className=''; msg.textContent='';

  if(!studentId || !name || !attend){ show('필수항목을 모두 입력해 주세요.', false); return; }
  if(attend==='불참' && !reason){ show('불참 사유를 입력해 주세요.', false); return; }
  if(!pads.student.hasSig){ show('학생 서명을 해주세요.', false); return; }
  if(!pads.parent.hasSig){ show('학부모 서명을 해주세요.', false); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '제출 중...';

  const payload = {
    studentId, name, attend, reason,
    signatureStudent: pads.student.cv.toDataURL('image/png'),
    signatureParent:  pads.parent.cv.toDataURL('image/png')
  };

  fetch(GOOGLE_SCRIPT_URL, {
    method: 'POST',
    // CORS 보안 정책 우회를 위해 Content-Type을 text/plain으로 설정
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(response => response.json())
  .then(data => {
    if(data.ok) {
      show('제출이 완료되었습니다. 감사합니다!', true);
      document.getElementById('frm').reset();
      clearSig('student'); clearSig('parent');
      reasonField.style.display='none';
    } else {
      show('오류가 발생했습니다.', false);
    }
    btn.disabled=false; btn.textContent='제출하기';
  })
  .catch(err => {
    show('통신 오류가 발생했습니다. 잠시 후 다시 시도해주세요.', false);
    btn.disabled=false; btn.textContent='제출하기';
  });
});

function show(t, ok){
  const m = document.getElementById('msg');
  m.textContent = t;
  m.className = 'msg ' + (ok ? 'ok' : 'err');
}
</script>
</body>
</html>
